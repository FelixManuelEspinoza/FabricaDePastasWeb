<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Codificación y responsive -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Título que se ve en la pestaña del navegador -->
    <title>FabricaPastas.Client</title>

    <!-- Base URL para el ruteo de Blazor (importante para que funcionen las rutas) -->
    <base href="/" />

    <!-- Bootstrap CSS local (incluido por defecto en Blazor) -->
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />

    <!-- Estilos globales del proyecto (tu app) -->
    <link rel="stylesheet" href="css/app.css" />

    <!-- Bootstrap Icons: permite usar <i class="bi bi-..."></i> en todas las páginas -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Estilos generados automáticamente por el proyecto (scoped css, etc.) -->
    <link href="FabricaPastas.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <!--
        Contenedor principal donde Blazor monta la app.
        Mientras carga, se muestra el "loading-progress".
    -->
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <!--
        UI de error estándar de Blazor.
        Aparece si ocurre un error no manejado.
    -->
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Bootstrap JS bundle:
         - Necesario para navbar toggler (hamburguesa), collapse, accordion, modals, etc. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script principal de Blazor WebAssembly (NO tocar el orden) -->
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
